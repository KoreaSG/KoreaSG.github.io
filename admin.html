<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 | 싱가포르 한인 커뮤니티 KoreaSG</title>
  <meta name="description" content="KoreaSG 관리자 페이지 — 주제 관리 및 신고 처리.">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    /* ===== 관리자 페이지 ===== */
    .admin-page-title {
      font-size: 24px;
      margin: 24px 0 8px;
    }
    .admin-section {
      margin-top: 36px;
    }
    .admin-section > h2 {
      font-size: 18px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .admin-gate-home {
      margin-top: 14px;
    }

    /* 주제 카드 */
    .admin-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
      padding: 18px;
      margin-bottom: 12px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .admin-card:hover {
      border-color: #d8dce1;
      box-shadow: var(--shadow);
    }
    .admin-card-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .admin-card-head b {
      font-size: 16px;
    }
    .admin-slug {
      font-size: 11.5px;
      font-weight: 700;
      color: var(--primary-ink);
      background: var(--primary-tint);
      padding: 3px 9px;
      border-radius: var(--radius-pill);
    }
    .admin-inline {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }
    .admin-inline .form-group {
      margin-bottom: 0;
    }
    .admin-inline-sort {
      width: 120px;
    }
    .admin-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      font-size: 14px;
      min-height: 36px;
      color: var(--text-sub);
    }
    .admin-check input {
      width: auto;
      accent-color: var(--primary);
    }
    .admin-inline .c-save {
      margin-left: auto;
    }
    .admin-create-card {
      border: 1.5px dashed #d8dce1;
      border-radius: var(--radius);
      background: var(--bg-soft);
      padding: 20px;
      margin-top: 18px;
    }
    .admin-create-card h3 {
      font-size: 15.5px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .admin-create-card h3::before {
      content: "+";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }
    .admin-note {
      font-size: 12.5px;
      color: var(--text-muted);
      margin-top: 10px;
      line-height: 1.6;
    }

    /* 신고 탭 */
    .admin-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .admin-tab {
      min-height: 40px;
      padding: 8px 18px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-pill);
      background: #fff;
      color: var(--text-sub);
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .admin-tab:hover {
      border-color: var(--primary);
      color: var(--primary-ink);
    }
    .admin-tab.is-active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      font-weight: 700;
    }

    /* 신고 테이블 */
    .admin-table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13.5px;
      min-width: 720px;
    }
    .admin-table th,
    .admin-table td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .admin-table th {
      background: var(--bg-soft);
      font-weight: 700;
      font-size: 12.5px;
      color: var(--text-sub);
      white-space: nowrap;
    }
    .admin-table tbody tr {
      transition: background 0.12s;
    }
    .admin-table tbody tr:hover {
      background: var(--bg-soft);
    }
    .admin-table tr:last-child td {
      border-bottom: none;
    }
    .admin-table td a {
      color: var(--primary-ink);
      font-weight: 600;
    }
    .admin-table td a:hover {
      text-decoration: underline;
    }
    .admin-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 32px 12px;
    }
    .admin-target-label {
      font-weight: 700;
    }
    .admin-target {
      font-size: 12.5px;
      margin-top: 2px;
    }
    .admin-mono {
      font-size: 12px;
      color: var(--text-muted);
      word-break: break-all;
    }
    .admin-badge {
      display: inline-block;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--success-ink);
      background: var(--success-bg);
      padding: 3px 9px;
      border-radius: var(--radius-pill);
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <h1 class="admin-page-title">관리자</h1>

    <div id="admin-gate" hidden></div>

    <div id="admin-content" hidden>
      <!-- A. 주제 관리 -->
      <section class="admin-section" aria-label="주제 관리">
        <h2>주제 관리</h2>
        <div id="community-list"></div>

        <div class="admin-create-card">
          <h3>새 주제 만들기</h3>
          <form id="community-create-form" novalidate>
            <div class="form-group">
              <label for="nc-slug">슬러그 (slug)</label>
              <input type="text" id="nc-slug" autocapitalize="none" spellcheck="false" placeholder="예: free-market">
              <p class="form-hint">영문 소문자·숫자·하이픈(-), 2~30자. 생성 후 변경 불가.</p>
            </div>
            <div class="form-group">
              <label for="nc-name">이름</label>
              <input type="text" id="nc-name" placeholder="예: 자유게시판">
            </div>
            <div class="form-group">
              <label for="nc-desc">설명</label>
              <textarea id="nc-desc" rows="2" placeholder="주제 설명 (선택)"></textarea>
            </div>
            <div class="form-group admin-inline-sort">
              <label for="nc-sort">정렬 순서</label>
              <input type="number" id="nc-sort" value="0">
            </div>
            <button type="submit" class="btn btn-primary" id="nc-submit">주제 생성</button>
          </form>
          <p class="admin-note">
            ※ 목록에는 활성 주제만 표시됩니다. 저장 시 활성을 해제하면 목록에서 제외되며,
            현재는 비활성 주제를 다시 불러오는 관리자 목록 RPC가 없습니다.
          </p>
        </div>
      </section>

      <!-- B. 신고 처리 -->
      <section class="admin-section" aria-label="신고 처리">
        <h2>신고 처리</h2>
        <div class="admin-tabs" id="report-tabs">
          <button type="button" class="admin-tab is-active" data-status="open">미처리</button>
          <button type="button" class="admin-tab" data-status="resolved">처리됨</button>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>대상</th>
                <th>사유</th>
                <th>메모</th>
                <th>신고자</th>
                <th>시간</th>
                <th>처리</th>
              </tr>
            </thead>
            <tbody id="reports-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    KoreaSG — 싱가포르 한인 커뮤니티
    <div id="visitor-stats" class="visitor-stats"></div>
  </footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <script src="js/util.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
