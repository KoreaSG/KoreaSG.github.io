<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 게시글 | 싱가포르 한인 커뮤니티 KoreaSG</title>
  <meta name="description" content="싱가포르 한인 커뮤니티 KoreaSG 게시글. 싱가포르 교민들의 생활정보와 이야기를 읽고 댓글로 소통해 보세요.">
  <link rel="canonical" href="https://koreasg.github.io/board-view.html">
  <meta property="og:title" content="커뮤니티 게시글 | 싱가포르 한인 커뮤니티 KoreaSG">
  <meta property="og:description" content="싱가포르 교민들의 생활정보와 이야기를 읽고 댓글로 소통해 보세요.">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://koreasg.github.io/board-view.html">
  <meta property="og:site_name" content="싱가포르 한인 커뮤니티 KoreaSG">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    .post-view {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .post-title {
      font-size: 22px;
      line-height: 1.4;
      word-break: break-word;
      margin-bottom: 8px;
    }
    .post-meta {
      font-size: 13px;
      color: var(--text-muted);
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .post-content {
      padding-top: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 120px;
    }
    .post-like-wrap {
      display: flex;
      justify-content: center;
      padding-top: 24px;
    }
    .post-like-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--text-sub);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .post-like-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }
    .post-like-btn.is-liked {
      background: var(--danger);
      border-color: var(--danger);
      color: #fff;
    }
    .post-like-btn.is-liked:hover {
      color: #fff;
      opacity: 0.9;
    }
    .post-like-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .post-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin: 16px 0 32px;
    }
    .comments-section h2 {
      font-size: 16px;
      margin-bottom: 4px;
    }
    .comments-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 16px;
      margin-bottom: 16px;
    }
    .comment-meta .comment-delete {
      margin-left: auto;
    }
    #comment-form textarea {
      min-height: 80px;
    }
    .checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }
    .comment-login-notice {
      font-size: 14px;
      color: var(--text-sub);
    }
    .comment-login-notice a {
      color: var(--primary);
      font-weight: 600;
    }
    .comment-login-notice a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div id="board-notice" class="notice-box" hidden></div>

    <div id="post-container"><div class="empty-state">불러오는 중…</div></div>

    <section class="comments-section" id="comments-section" hidden>
      <h2>댓글 <span id="comment-count-label">0</span></h2>
      <div class="comments-card">
        <div id="comment-list"><div class="empty-state">불러오는 중…</div></div>
      </div>

      <form id="comment-form">
        <div class="form-group">
          <label for="comment-content">내용</label>
          <textarea id="comment-content" rows="3" maxlength="2000" required placeholder="댓글을 입력해주세요"></textarea>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="comment-anonymous">
            익명으로 작성
          </label>
          <p class="form-hint">체크 시 아이디 대신 '익명'으로 표시됩니다.</p>
        </div>
        <button type="submit" class="btn btn-primary" id="comment-submit-btn">댓글 등록</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    KoreaSG — 싱가포르 한인 커뮤니티
  </footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <script src="js/util.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/messages-send.js"></script>
  <script src="js/board-view.js"></script>
</body>
</html>
