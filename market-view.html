<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>중고거래 매물 상세 | 싱가포르 한인 커뮤니티 KoreaSG</title>
  <meta name="description" content="싱가포르 한인 중고거래 매물 상세 정보. 사진, 가격, 판매자 정보를 확인하고 쪽지로 거래를 시작해 보세요.">
  <link rel="canonical" href="https://koreasg.github.io/market-view.html">
  <meta property="og:title" content="중고거래 매물 상세 | 싱가포르 한인 커뮤니티 KoreaSG">
  <meta property="og:description" content="싱가포르 한인 중고거래 매물 상세 정보. 사진, 가격, 판매자 정보를 확인하고 쪽지로 거래를 시작해 보세요.">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://koreasg.github.io/market-view.html">
  <meta property="og:site_name" content="싱가포르 한인 커뮤니티 KoreaSG">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    .item-detail,
    .comments-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }
    .item-title {
      font-size: 20px;
      margin-top: 16px;
      word-break: break-word;
    }
    .item-price {
      font-size: 24px;
      font-weight: 700;
      margin: 6px 0;
    }
    .item-meta {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .item-desc {
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .item-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }
    .comments-section h2 {
      font-size: 17px;
      margin-bottom: 8px;
    }
    .comment-item .comment-meta .btn {
      margin-left: auto;
    }
    /* --- 소유자 상태 변경 세그먼트 (레이아웃만; 시각 스타일은 common.css .status-seg 공용) --- */
    .status-control {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    /* --- 좋아요/신고 버튼 줄 (레이아웃만; 버튼 시각 스타일은 common.css 공용) --- */
    .item-like-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div id="market-notice" class="notice-box" hidden></div>

    <div id="item-container"><div class="empty-state">불러오는 중…</div></div>

    <section id="comments-section" class="comments-section" hidden>
      <h2 id="comments-heading">댓글 0</h2>
      <div id="comment-list"></div>

      <form id="comment-form">
        <div class="form-group">
          <textarea id="comment-content" maxlength="1000" required placeholder="댓글을 입력하세요" style="min-height:80px"></textarea>
        </div>
        <div style="text-align:right">
          <button type="submit" id="comment-submit" class="btn btn-primary btn-sm">등록</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    KoreaSG — 싱가포르 한인 커뮤니티
  </footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <script src="js/util.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/messages-send.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/market-view.js"></script>
</body>
</html>
