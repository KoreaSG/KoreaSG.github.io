<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판 글쓰기 | 싱가포르 한인 커뮤니티 KoreaSG</title>
  <meta name="description" content="싱가포르 한인 커뮤니티 게시판에 새 글을 작성하는 페이지입니다.">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://koreasg.github.io/board-new.html">
  <meta property="og:title" content="게시판 글쓰기 | 싱가포르 한인 커뮤니티 KoreaSG">
  <meta property="og:description" content="싱가포르 한인 커뮤니티 게시판에 새 글을 작성하는 페이지입니다.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://koreasg.github.io/board-new.html">
  <meta property="og:site_name" content="싱가포르 한인 커뮤니티 KoreaSG">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 720px;
      margin: 0 auto;
    }
    .page-title {
      font-size: 20px;
      max-width: 720px;
      margin: 0 auto 16px;
    }
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 24px;
    }
    .checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }
    .img-previews {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    .img-preview {
      position: relative;
      width: 88px;
      height: 88px;
    }
    .img-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .img-remove {
      position: absolute;
      top: -7px;
      right: -7px;
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }
    .upload-progress {
      font-size: 13px;
      color: var(--primary);
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div id="board-notice" class="notice-box" hidden></div>

    <h1 class="page-title" id="page-title">글쓰기</h1>

    <form id="post-form" class="form-card">
      <div class="form-group">
        <label for="post-title">제목</label>
        <input type="text" id="post-title" maxlength="100" required placeholder="제목을 입력해주세요">
      </div>

      <div class="form-group">
        <label for="post-community">주제</label>
        <select id="post-community" required>
          <option value="">불러오는 중…</option>
        </select>
      </div>

      <div class="form-group">
        <label for="post-content">내용</label>
        <textarea id="post-content" rows="12" maxlength="20000" required placeholder="내용을 입력해주세요"></textarea>
      </div>

      <div class="form-group">
        <label for="image-input">사진</label>
        <input type="file" id="image-input" accept="image/*" multiple>
        <div class="form-hint">최대 8장까지 등록할 수 있습니다.</div>
        <div id="img-previews" class="img-previews"></div>
        <div id="upload-progress" class="upload-progress" hidden></div>
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="post-anonymous">
          익명으로 작성
        </label>
        <p class="form-hint">체크 시 아이디 대신 '익명'으로 표시됩니다.</p>
      </div>

      <div class="form-actions">
        <a class="btn btn-ghost" href="board.html" id="cancel-link">취소</a>
        <button type="submit" class="btn btn-primary" id="submit-btn">등록</button>
      </div>
    </form>
  </main>

  <footer class="site-footer">
    KoreaSG — 싱가포르 한인 커뮤니티
  </footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <script src="js/util.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/board-form.js"></script>
</body>
</html>
