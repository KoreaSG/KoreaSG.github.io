<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>글쓰기 - KoreaSG</title>
  <meta name="description" content="싱가포르 한인 커뮤니티 게시판 글쓰기">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 720px;
      margin: 0 auto;
    }
    .page-title {
      font-size: 20px;
      max-width: 720px;
      margin: 0 auto 16px;
    }
    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div id="board-notice" class="notice-box" hidden></div>

    <h1 class="page-title" id="page-title">글쓰기</h1>

    <form id="post-form" class="form-card">
      <div class="form-group">
        <label for="post-title">제목</label>
        <input type="text" id="post-title" maxlength="100" required placeholder="제목을 입력해주세요">
      </div>

      <div class="form-group" id="author-group">
        <label for="post-author">작성자 이름</label>
        <input type="text" id="post-author" maxlength="30" placeholder="익명">
      </div>

      <div class="form-group">
        <label for="post-content">내용</label>
        <textarea id="post-content" rows="12" maxlength="20000" required placeholder="내용을 입력해주세요"></textarea>
      </div>

      <div class="form-group" id="password-group">
        <label for="post-password">비밀번호</label>
        <input type="password" id="post-password" inputmode="numeric" pattern="\d{4}" maxlength="4" autocomplete="off" placeholder="숫자 4자리">
        <p class="form-hint">수정/삭제 시 필요합니다.</p>
      </div>

      <div class="form-actions">
        <a class="btn btn-ghost" href="board.html" id="cancel-link">취소</a>
        <button type="submit" class="btn btn-primary" id="submit-btn">등록</button>
      </div>
    </form>
  </main>

  <footer class="site-footer">
    KoreaSG — 싱가포르 한인 커뮤니티
  </footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <script src="js/util.js"></script>
  <script src="js/board-form.js"></script>
</body>
</html>
