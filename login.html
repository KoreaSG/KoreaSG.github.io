<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - KoreaSG</title>
  <meta name="description" content="KoreaSG 로그인">
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* 로그인 페이지 전용 */
    .auth-card {
      max-width: 400px;
      margin: 40px auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      box-shadow: var(--shadow);
    }
    .auth-card h1 {
      font-size: 22px;
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-alt {
      text-align: center;
      font-size: 14px;
      color: var(--text-sub);
      margin-top: 18px;
    }
    .auth-alt a {
      color: var(--primary);
      font-weight: 600;
    }
    .auth-alt a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="auth-card">
      <h1>로그인</h1>
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-username">아이디</label>
          <input type="text" id="login-username" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="아이디">
        </div>
        <div class="form-group">
          <label for="login-password">비밀번호</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="비밀번호">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-submit">로그인</button>
      </form>
      <p class="auth-alt">아직 계정이 없으신가요? <a id="signup-link" href="signup.html">회원가입</a></p>
    </div>
  </main>

  <footer class="site-footer">
    KoreaSG — 싱가포르 한인 커뮤니티
  </footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <script src="js/util.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
