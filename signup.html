<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 | 싱가포르 한인 커뮤니티 KoreaSG</title>
  <meta name="description" content="싱가포르 한인 커뮤니티 KoreaSG 회원가입 페이지입니다.">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://koreasg.github.io/signup.html">
  <meta property="og:title" content="회원가입 | 싱가포르 한인 커뮤니티 KoreaSG">
  <meta property="og:description" content="싱가포르 한인 커뮤니티 KoreaSG 회원가입 페이지입니다.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://koreasg.github.io/signup.html">
  <meta property="og:site_name" content="싱가포르 한인 커뮤니티 KoreaSG">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    /* 회원가입 페이지 전용 */
    .auth-card {
      max-width: 400px;
      margin: 40px auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      box-shadow: var(--shadow);
    }
    .auth-card h1 {
      font-size: 22px;
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-alt {
      text-align: center;
      font-size: 14px;
      color: var(--text-sub);
      margin-top: 18px;
    }
    .auth-alt a {
      color: var(--primary);
      font-weight: 600;
    }
    .auth-alt a:hover {
      text-decoration: underline;
    }
    .field-msg {
      font-size: 12px;
      margin-top: 4px;
    }
    .field-msg.is-ok {
      color: var(--success);
    }
    .field-msg.is-error {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="container">
    <div class="auth-card">
      <h1>회원가입</h1>
      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="signup-username">아이디</label>
          <input type="text" id="signup-username" autocomplete="username" autocapitalize="none" spellcheck="false" maxlength="20" placeholder="아이디">
          <p class="form-hint">영문 소문자/숫자/_ 3~20자</p>
          <p class="field-msg" id="username-msg" hidden></p>
        </div>
        <div class="form-group">
          <label for="signup-password">비밀번호</label>
          <input type="password" id="signup-password" autocomplete="new-password" placeholder="6자 이상">
        </div>
        <div class="form-group">
          <label for="signup-password2">비밀번호 확인</label>
          <input type="password" id="signup-password2" autocomplete="new-password" placeholder="비밀번호 다시 입력">
          <p class="field-msg" id="password2-msg" hidden></p>
        </div>
        <div class="form-group">
          <label for="signup-region">지역</label>
          <select id="signup-region"></select>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="signup-submit">가입하기</button>
      </form>
      <p class="auth-alt">이미 계정이 있으신가요? <a id="login-link" href="login.html">로그인</a></p>
    </div>
  </main>

  <footer class="site-footer">
    KoreaSG — 싱가포르 한인 커뮤니티
  </footer>

  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <script src="js/util.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
